<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function promptUser() {
            const inputName = prompt("What is your name?");

            if (inputName === null || inputName.trim() === "") {
                alert("You did not enter your name!");
                return;
            }

            const inputAge = prompt("What is your age?");

            if (inputAge === null || inputAge.trim() === "") {
                alert("You did not enter your age!");
                return;
            }

            const userAge = Number(inputAge);

            if (Number.isNaN(userAge) || userAge < 0) {
                alert("Please enter a valid age!");
                return;
            }

            if (userAge > 120) {
                const isAgeConfirmed = confirm(
                    `Are you really ${userAge} years old?`
                );

                if (!isAgeConfirmed) {
                    alert("Age was not confirmed.");
                    return;
                }
            }

            const isUserConfirmed = confirm(
                `Is your name ${inputName.trim()}, and are you ${userAge} years old?`
            );

            alert(`You have${isUserConfirmed ? "" : " not"} confirmed your details.`);
        }

        promptUser();
    </script>
</body>
</html>
