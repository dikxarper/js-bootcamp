<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Interaction</title>
</head>
<body>
    <script>
        const name = prompt("What is your name?");
        
        if (name !== null) {
            const isConfirmed = confirm(`Is your name ${name}?`);
            alert(`Name confirmed: ${isConfirmed})`);
        }
    </script>
</body>
</html>
